# src/app/config/tasks.yaml
# -------------------------
# Define as tarefas para os agentes trabalhadores.
# O 'viz_manager' (hierárquico) irá orquestrar o fluxo e passar o contexto.

task_analyze_data:
  description: >
    Analisar o prompt inicial do usuário (ex: {user_prompt}) e o arquivo 
    de dados (ex: {data_path}).
    A análise deve:
    1. Validar e ler o arquivo de dados usando a FileReadTool.
    2. Limpar os dados (se necessário).
    3. Extrair o schema das colunas (nome, tipo de dado).
    4. Gerar um resumo estatístico básico.
  expected_output: >
    Um objeto Pydantic 'AnalysisBrief' contendo o schema dos dados, 
    um resumo estatístico e o JSON dos dados limpos.
  agent: data_analyst
  async_execution: false

task_plan_dashboard:
  description: >
    Com base no 'AnalysisBrief' recebido e na intenção do usuário, 
    projetar um plano de dashboard ('DashboardPlan').
    A tarefa deve:
    1. Identificar a(s) tarefa(s) principal(is) do usuário (ex: Comparação, 
       Ordenação, Tendência, Visualização Composta).
    2. Usar a ferramenta RAG ('Storytelling com Dados') para determinar 
       os tipos de gráficos ideais.
    3. Definir a estrutura do dashboard (quantos gráficos) e como eles 
       irão interagir (ex: 'brushing filter', 'dropdown filter').
  expected_output: >
    Um objeto Pydantic 'DashboardPlan' detalhando a arquitetura do 
    dashboard (lista de gráficos, tipos, eixos e interações).
  agent: dashboard_architect
  async_execution: false

task_generate_viz_json: # (O nome do método não importa, a descrição sim)
  description: >
    Receber o 'DashboardPlan' e o 'AnalysisBrief' (para os dados).
    Converter o plano em CÓDIGO PYTHON executável usando Altair.
    A tarefa deve:
    1. Usar a RagTool (Documentação do Altair) para encontrar a
       sintaxe Python correta.
    2. Gerar um ÚNICO bloco de código Python. O código deve assumir 
       que um DataFrame 'df' já existe.
    3. O código DEVE criar uma variável de gráfico (ex: 'chart = alt.Chart...').
    4. O código NÃO deve incluir 'import' ou 'st.altair_chart()'.
    
    CRÍTICO: A saída DEVE ser APENAS o bloco de código Python.
  expected_output: >
    Uma string contendo o bloco de código Python (Altair) executável.
    Exemplo: 
    "
    chart = alt.Chart(df).mark_bar().encode(
        x=alt.X('Produto', type='nominal'),
        y=alt.Y('Vendas (R)', type='quantitative')
    ).interactive()
    "
  agent: viz_generator
  async_execution: false

task_generate_narrative:
  description: >
    Receber o 'DashboardPlan' e o 'AnalysisBrief'.
    Gerar uma explicação em linguagem natural (Markdown) para o usuário.
    A explicação deve:
    1. Atuar como a camada "Explicável" (XAI).
    2. Justificar por que os gráficos foram escolhidos (baseado no 
       'Storytelling com Dados' e na tarefa do usuário).
    3. Apontar 1 ou 2 insights iniciais dos dados.
    4. Ser escrita para um usuário com "baixa literalidade em dados".
  expected_output: >
    Uma string em Markdown com a análise e explicação do dashboard 
    para o usuário final (será o 'evaluation_report' no 'ChartOutput').
  agent: narrative_generator
  async_execution: false